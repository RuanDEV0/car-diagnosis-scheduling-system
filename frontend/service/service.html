<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Serviços - Oficina Mecânica</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Cadastro de Serviços</h1>
        <form id="servicoForm">
            <div class="form-group">
                <label for="nomeServico">Nome do Serviço:</label>
                <input type="text" id="nomeServico" name="nomeServico" required>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição:</label>
                <textarea id="descricao" name="descricao" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="preco">Preço (R$):</label>
                <input type="number" id="preco" name="preco" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="tempoEstimado">Tempo Estimado (horas):</label>
                <input type="number" id="tempoEstimado" name="tempoEstimado" step="0.1" required>
            </div>

            <button type="submit">Cadastrar Serviço</button>
        </form>
    </div>

    <script src="js/scripts.js"></script>
</body>
</html>
